<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="小本本 xbb">
    <meta name="color-scheme" content="dark">
    <link rel="apple-touch-icon" href="/icon-192-touch.png?v=1">
    <link rel="manifest" href="/manifest.json">
    <title>WebGPU Cosine Similarity Graph</title>
    <script type="module" src="/src/root.tsx"></script>
    <style>     /* height: 100%; margin: 0; */
      :root {--bt-color: #0ea5e9; color-scheme: dark light; } /* --bt-color:light-dark(#0ea5e9, #38bdf8) need chromium 123  */
      html, body {  background: #0b0e13; color: darkgray; font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell }
      #app { display: flex; flex-direction: row; height: 100%; overflow: hidden; }
      canvas { display: flex; width: 100%; height: 100%; }
      .progress { position: absolute; right: 16px; bottom: 55px; width: 240px; height: 10px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; box-shadow: 0 0 0 1px rgba(255,255,255,0.05); }
      .progress > .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #38bdf8, #22d3ee); transition: width 120ms ease; }
      .stts { position: absolute; right: 16px; bottom: 16px; background: rgba(0,0,0,0.35); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 10px; font-size: 12px; }
      aside button {padding: 22px;}
      a,input { color: var(--bt-color); text-decoration: none; margin: 3px }
      input { border:0}
      button:hover {color:white; background-color: #222;}
      button.selected { background-color: #38bff83a;}
      button{ color:var(--bt-color); font-size:larger;background: none; border: none;}
      
      .ascii-wrap {
        /* font-family: monospace; */
        font-size: 32px;
        color: var(--bt-color);
        text-shadow: 0 0 5px var(--bt-color);
      display: flex;
      justify-content: center; /* Horizontal centering */
      text-align: center; /* Horizontal centering */
      align-items: center;     /* Vertical centering */
      min-height: 100vh;       /* Takes full viewport height */
      /* display: flex; */
        animation: pulse 1.5s infinite alternate ease-in-out;
      }
      @keyframes pulse { from {text-shadow: 0 0 2px var(--bt-color);
          opacity: 0.6;
        }
        to {
          text-shadow: 0 0 15px var(--bt-color), 0 0 25px var(--bt-color);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"> <div class="ascii-wrap">小本本<br>x b b</div> </div>
      <canvas id="three"> </canvas>
      <div class="progress" id="progress" style="display: none;"><div class="bar" id="progress-bar" /> </div>
  </body>
  </html>
